<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Advanced Study Assistant</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a1429 0%, #1a2a4a 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        #root {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        
        input:disabled, textarea:disabled {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function JarvisStudyAssistant() {
            const [activeTab, setActiveTab] = useState('chat');
            const [messages, setMessages] = useState([
                {
                    id: 1,
                    type: 'jarvis',
                    text: "Good day. I am JARVIS, your advanced study assistant. I can help with explanations, quizzes, flashcards, exam prep, and more. What would you like to focus on?",
                    timestamp: new Date()
                }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const messagesEndRef = useRef(null);
            const recognitionRef = useRef(null);

            // Flashcards
            const [flashcards, setFlashcards] = useState([
                { id: 1, question: 'What is photosynthesis?', answer: 'A process where plants convert sunlight into chemical energy', subject: 'Biology' },
                { id: 2, question: 'What is the capital of France?', answer: 'Paris', subject: 'Geography' }
            ]);
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            const [showAnswer, setShowAnswer] = useState(false);
            const [newQuestion, setNewQuestion] = useState('');
            const [newAnswer, setNewAnswer] = useState('');
            const [newSubject, setNewSubject] = useState('');

            // Quiz
            const [quizzes, setQuizzes] = useState([
                { id: 1, title: 'Biology Basics', questions: 5, score: null, subject: 'Biology' },
                { id: 2, title: 'History Chapter 3', questions: 10, score: null, subject: 'History' }
            ]);
            const [quizMode, setQuizMode] = useState(null);
            const [quizProgress, setQuizProgress] = useState(0);
            const [quizScore, setQuizScore] = useState(0);

            // Exam Prep
            const [exams, setExams] = useState([
                { id: 1, subject: 'Mathematics', date: '2024-05-15', topics: ['Algebra', 'Calculus', 'Geometry'], readiness: 60 },
                { id: 2, subject: 'Physics', date: '2024-05-20', topics: ['Mechanics', 'Thermodynamics'], readiness: 40 }
            ]);

            // Tasks
            const [tasks, setTasks] = useState([
                { id: 1, text: 'Complete Chapter 5 exercises', subject: 'Mathematics', done: false },
                { id: 2, text: 'Review photosynthesis notes', subject: 'Biology', done: false }
            ]);
            const [newTask, setNewTask] = useState('');

            // Timer
            const [timerSeconds, setTimerSeconds] = useState(1500);
            const [isTimerRunning, setIsTimerRunning] = useState(false);

            // Initialize speech recognition
            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = false;
                    recognitionRef.current.interimResults = false;

                    recognitionRef.current.onresult = (event) => {
                        const transcript = Array.from(event.results)
                            .map(result => result[0].transcript)
                            .join('');
                        setInput(transcript);
                        setIsListening(false);
                    };

                    recognitionRef.current.onerror = () => {
                        setIsListening(false);
                    };
                }
            }, []);

            // Timer effect
            useEffect(() => {
                let interval;
                if (isTimerRunning && timerSeconds > 0) {
                    interval = setInterval(() => setTimerSeconds(s => s - 1), 1000);
                } else if (timerSeconds === 0) {
                    setIsTimerRunning(false);
                    speak("Your study session is complete!");
                }
                return () => clearInterval(interval);
            }, [isTimerRunning, timerSeconds]);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 0.95;
                    speechSynthesis.speak(utterance);
                }
            };

            const startListening = () => {
                if (recognitionRef.current) {
                    setIsListening(true);
                    recognitionRef.current.start();
                }
            };

            const getStudyResponse = async (userMessage) => {
                try {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 1000,
                            system: `You are JARVIS, an advanced study assistant with a sophisticated British tone. Be helpful, clear, and encouraging. Keep responses concise (2-3 sentences). You can explain concepts, generate quiz questions, create flashcards, suggest study tips, and help with exam preparation.`,
                            messages: [{ role: 'user', content: userMessage }]
                        })
                    });

                    const data = await response.json();
                    return data.content?.[0]?.text || "I apologize for the delay.";
                } catch (error) {
                    return "Let me retry that for you. Make sure you're connected to the internet.";
                }
            };

            const handleSendMessage = async () => {
                if (!input.trim()) return;

                const userMessage = input.trim();
                setInput('');
                setLoading(true);

                setMessages(prev => [...prev, {
                    id: Date.now(),
                    type: 'user',
                    text: userMessage,
                    timestamp: new Date()
                }]);

                const jarvisResponse = await getStudyResponse(userMessage);
                speak(jarvisResponse);

                setMessages(prev => [...prev, {
                    id: Date.now() + 1,
                    type: 'jarvis',
                    text: jarvisResponse,
                    timestamp: new Date()
                }]);

                setLoading(false);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const addFlashcard = (e) => {
                e.preventDefault();
                if (newQuestion.trim() && newAnswer.trim()) {
                    setFlashcards([...flashcards, {
                        id: Date.now(),
                        question: newQuestion,
                        answer: newAnswer,
                        subject: newSubject || 'General'
                    }]);
                    setNewQuestion('');
                    setNewAnswer('');
                    setNewSubject('');
                    speak("Flashcard added successfully");
                }
            };

            const startQuiz = (quizId) => {
                setQuizMode(quizId);
                setQuizProgress(0);
                setQuizScore(0);
                speak("Quiz started. Good luck!");
            };

            const finishQuiz = () => {
                const quiz = quizzes.find(q => q.id === quizMode);
                const percentage = Math.round((quizScore / (quiz?.questions || 1)) * 100);
                speak(`Quiz complete! You scored ${percentage} percent.`);
                setQuizMode(null);
            };

            const addTask = (e) => {
                e.preventDefault();
                if (newTask.trim()) {
                    setTasks([...tasks, {
                        id: Date.now(),
                        text: newTask,
                        subject: 'General',
                        done: false
                    }]);
                    setNewTask('');
                    speak("Task added");
                }
            };

            return (
                <div style={{
                    width: '100%',
                    maxWidth: '900px',
                    height: '90vh',
                    display: 'flex',
                    flexDirection: 'column',
                    background: 'linear-gradient(135deg, #0a1429 0%, #1a2a4a 100%)',
                    borderRadius: '12px',
                    overflow: 'hidden',
                    border: '1px solid rgba(255,215,0,0.2)',
                    boxShadow: '0 0 30px rgba(0,0,0,0.5)'
                }}>
                    {/* Header */}
                    <div style={{
                        background: 'rgba(255,215,0,0.05)',
                        borderBottom: '1px solid rgba(255,215,0,0.2)',
                        padding: '12px 16px',
                        display: 'flex',
                        alignItems: 'center',
                        gap: '8px'
                    }}>
                        <span style={{ color: '#FFD700', fontSize: '12px', fontWeight: '500', letterSpacing: '1px' }}>
                            ⚡ JARVIS ADVANCED STUDY SYSTEM
                        </span>
                        <div style={{ flex: 1 }} />
                        {isListening && (
                            <div style={{
                                display: 'flex',
                                alignItems: 'center',
                                gap: '6px',
                                color: '#FF6B6B',
                                fontSize: '11px'
                            }}>
                                <div style={{
                                    width: '6px', height: '6px', borderRadius: '50%',
                                    background: '#FF6B6B', animation: 'pulse 1s infinite'
                                }} />
                                Listening...
                            </div>
                        )}
                        <div style={{
                            width: '8px',
                            height: '8px',
                            borderRadius: '50%',
                            background: '#00FF00',
                            boxShadow: '0 0 8px #00FF00'
                        }} />
                    </div>

                    {/* Tabs */}
                    <div style={{
                        display: 'flex',
                        borderBottom: '1px solid rgba(255,215,0,0.2)',
                        background: 'rgba(255,215,0,0.02)',
                        overflowX: 'auto'
                    }}>
                        {['chat', 'flashcards', 'quiz', 'exam', 'tasks', 'timer'].map(tab => (
                            <button
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                style={{
                                    padding: '12px 14px',
                                    background: activeTab === tab ? 'rgba(255,215,0,0.1)' : 'transparent',
                                    border: 'none',
                                    color: activeTab === tab ? '#FFD700' : '#64C8FF',
                                    fontSize: '11px',
                                    fontWeight: '500',
                                    cursor: 'pointer',
                                    borderBottom: activeTab === tab ? '2px solid #FFD700' : '2px solid transparent',
                                    textTransform: 'capitalize',
                                    whiteSpace: 'nowrap'
                                }}
                            >
                                {tab}
                            </button>
                        ))}
                    </div>

                    {/* Content */}
                    <div style={{ flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
                        
                        {/* Chat Tab */}
                        {activeTab === 'chat' && (
                            <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
                                <div style={{ flex: 1, padding: '16px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                    {messages.map(msg => (
                                        <div key={msg.id} style={{ display: 'flex', justifyContent: msg.type === 'user' ? 'flex-end' : 'flex-start' }}>
                                            <div style={{
                                                maxWidth: '70%',
                                                padding: '10px 12px',
                                                borderRadius: '8px',
                                                background: msg.type === 'user' ? 'rgba(255,215,0,0.15)' : 'rgba(100,200,255,0.1)',
                                                border: `1px solid ${msg.type === 'user' ? 'rgba(255,215,0,0.3)' : 'rgba(100,200,255,0.3)'}`,
                                                color: msg.type === 'user' ? '#FFD700' : '#64C8FF',
                                                fontSize: '13px',
                                                lineHeight: '1.5'
                                            }}>
                                                {msg.text}
                                            </div>
                                        </div>
                                    ))}
                                    {loading && (
                                        <div style={{ display: 'flex', gap: '4px' }}>
                                            {[0, 1, 2].map(i => (
                                                <div key={i} style={{
                                                    width: '6px', height: '6px', borderRadius: '50%',
                                                    background: '#64C8FF', animation: 'pulse 1s infinite',
                                                    animationDelay: `${i * 0.2}s`
                                                }} />
                                            ))}
                                        </div>
                                    )}
                                    <div ref={messagesEndRef} />
                                </div>
                                <div style={{ borderTop: '1px solid rgba(255,215,0,0.2)', padding: '12px', background: 'rgba(255,215,0,0.03)', display: 'flex', gap: '8px' }}>
                                    <input
                                        type="text"
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyPress={handleKeyPress}
                                        placeholder="Type or use voice..."
                                        disabled={loading}
                                        style={{
                                            flex: 1, padding: '8px 12px', background: 'rgba(10,20,41,0.8)',
                                            border: '1px solid rgba(255,215,0,0.3)', borderRadius: '8px',
                                            color: '#FFD700', fontSize: '12px', fontFamily: 'inherit'
                                        }}
                                    />
                                    <button
                                        onClick={startListening}
                                        title="Voice input"
                                        style={{
                                            padding: '8px 12px', background: isListening ? 'rgba(255,107,107,0.2)' : 'rgba(100,200,255,0.2)',
                                            border: `1px solid ${isListening ? 'rgba(255,107,107,0.4)' : 'rgba(100,200,255,0.4)'}`,
                                            borderRadius: '8px',
                                            color: isListening ? '#FF6B6B' : '#64C8FF', cursor: 'pointer'
                                        }}
                                    >
                                        🎤
                                    </button>
                                    <button
                                        onClick={handleSendMessage}
                                        disabled={loading}
                                        style={{
                                            padding: '8px 12px', background: 'rgba(255,215,0,0.2)',
                                            border: '1px solid rgba(255,215,0,0.4)', borderRadius: '8px',
                                            color: '#FFD700', cursor: 'pointer'
                                        }}
                                    >
                                        📤
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Flashcards Tab */}
                        {activeTab === 'flashcards' && (
                            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '16px', gap: '16px' }}>
                                {flashcards.length > 0 ? (
                                    <div>
                                        <div style={{ marginBottom: '16px' }}>
                                            <div
                                                onClick={() => setShowAnswer(!showAnswer)}
                                                style={{
                                                    padding: '24px',
                                                    background: 'rgba(100,200,255,0.1)',
                                                    border: '2px solid rgba(100,200,255,0.3)',
                                                    borderRadius: '12px',
                                                    color: '#64C8FF',
                                                    fontSize: '14px',
                                                    minHeight: '120px',
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justifyContent: 'center',
                                                    textAlign: 'center',
                                                    cursor: 'pointer'
                                                }}
                                            >
                                                <div>
                                                    <div style={{ fontSize: '11px', color: '#FFD700', marginBottom: '8px' }}>
                                                        {showAnswer ? 'ANSWER' : 'QUESTION'}
                                                    </div>
                                                    <div>{showAnswer ? flashcards[currentCardIndex]?.answer : flashcards[currentCardIndex]?.question}</div>
                                                    <div style={{ fontSize: '10px', marginTop: '12px', color: '#64C8FF80' }}>
                                                        Click to {showAnswer ? 'hide' : 'reveal'} answer
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px', color: '#FFD700', fontSize: '12px' }}>
                                            <span>Card {currentCardIndex + 1} of {flashcards.length}</span>
                                        </div>
                                        <div style={{ display: 'flex', gap: '8px' }}>
                                            <button
                                                onClick={() => {
                                                    setCurrentCardIndex(Math.max(0, currentCardIndex - 1));
                                                    setShowAnswer(false);
                                                }}
                                                disabled={currentCardIndex === 0}
                                                style={{
                                                    flex: 1, padding: '8px', background: 'rgba(100,200,255,0.2)',
                                                    border: '1px solid rgba(100,200,255,0.3)', borderRadius: '8px',
                                                    color: '#64C8FF', cursor: 'pointer', fontSize: '12px'
                                                }}
                                            >
                                                ← Previous
                                            </button>
                                            <button
                                                onClick={() => {
                                                    setCurrentCardIndex(Math.min(flashcards.length - 1, currentCardIndex + 1));
                                                    setShowAnswer(false);
                                                }}
                                                disabled={currentCardIndex === flashcards.length - 1}
                                                style={{
                                                    flex: 1, padding: '8px', background: 'rgba(100,200,255,0.2)',
                                                    border: '1px solid rgba(100,200,255,0.3)', borderRadius: '8px',
                                                    color: '#64C8FF', cursor: 'pointer', fontSize: '12px'
                                                }}
                                            >
                                                Next →
                                            </button>
                                        </div>
                                    </div>
                                ) : null}
                                
                                <div style={{ borderTop: '1px solid rgba(255,215,0,0.2)', paddingTop: '12px' }}>
                                    <h3 style={{ color: '#FFD700', fontSize: '13px', marginBottom: '8px' }}>Add Flashcard</h3>
                                    <form onSubmit={addFlashcard} style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                        <input
                                            type="text"
                                            placeholder="Question..."
                                            value={newQuestion}
                                            onChange={(e) => setNewQuestion(e.target.value)}
                                            style={{
                                                padding: '8px 12px', background: 'rgba(10,20,41,0.8)',
                                                border: '1px solid rgba(255,215,0,0.3)', borderRadius: '8px',
                                                color: '#FFD700', fontSize: '12px', fontFamily: 'inherit'
                                            }}
                                        />
                                        <textarea
                                            placeholder="Answer..."
                                            value={newAnswer}
                                            onChange={(e) => setNewAnswer(e.target.value)}
                                            style={{
                                                padding: '8px 12px', background: 'rgba(10,20,41,0.8)',
                                                border: '1px solid rgba(255,215,0,0.3)', borderRadius: '8px',
                                                color: '#FFD700', fontSize: '12px', fontFamily: 'inherit',
                                                minHeight: '60px', resize: 'vertical'
                                            }}
                                        />
                                        <input
                                            type="text"
                                            placeholder="Subject..."
                                            value={newSubject}
                                            onChange={(e) => setNewSubject(e.target.value)}
                                            style={{
                                                padding: '8px 12px', background: 'rgba(10,20,41,0.8)',
                                                border: '1px solid rgba(255,215,0,0.3)', borderRadius: '8px',
                                                color: '#FFD700', fontSize: '12px', fontFamily: 'inherit'
                                            }}
                                        />
                                        <button type="submit" style={{
                                            padding: '8px 12px', background: 'rgba(76,205,196,0.2)',
                                            border: '1px solid rgba(76,205,196,0.4)', borderRadius: '8px',
                                            color: '#4ECDC4', cursor: 'pointer', fontWeight: '500', fontSize: '12px'
                                        }}>
                                            + Add Card
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Quiz Tab */}
                        {activeTab === 'quiz' && (
                            <div style={{ flex: 1, padding: '16px', display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                {!quizMode ? (
                                    quizzes.map(quiz => (
                                        <div key={quiz.id} style={{
                                            padding: '12px', background: 'rgba(100,200,255,0.08)',
                                            border: '1px solid rgba(100,200,255,0.2)', borderRadius: '8px'
                                        }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                                                <div>
                                                    <div style={{ color: '#64C8FF', fontWeight: '500', fontSize: '13px' }}>{quiz.title}</div>
                                                    <div style={{ color: '#FFD700', fontSize: '11px' }}>{quiz.subject} • {quiz.questions} questions</div>
                                                </div>
                                                <button
                                                    onClick={() => startQuiz(quiz.id)}
                                                    style={{
                                                        padding: '6px 12px', background: 'rgba(76,205,196,0.2)',
                                                        border: '1px solid rgba(76,205,196,0.4)', borderRadius: '8px',
                                                        color: '#4ECDC4', cursor: 'pointer', fontSize: '11px', fontWeight: '500'
                                                    }}
                                                >
                                                    Start
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <div style={{ textAlign: 'center', paddingTop: '40px' }}>
                                        <div style={{ fontSize: '32px', color: '#FFD700', marginBottom: '12px', fontWeight: '500' }}>
                                            {Math.round((quizProgress / (quizzes.find(q => q.id === quizMode)?.questions || 1)) * 100)}%
                                        </div>
                                        <div style={{ color: '#64C8FF', marginBottom: '24px', fontSize: '13px' }}>
                                            Question {quizProgress + 1} of {quizzes.find(q => q.id === quizMode)?.questions}
                                        </div>
                                        <div style={{
                                            padding: '20px', background: 'rgba(100,200,255,0.1)',
                                            border: '1px solid rgba(100,200,255,0.3)', borderRadius: '8px',
                                            marginBottom: '16px', color: '#64C8FF', fontSize: '13px'
                                        }}>
                                            Sample question - Answer this question correctly
                                        </div>
                                        <div style={{ display: 'flex', gap: '8px' }}>
                                            <button
                                                onClick={() => {
                                                    setQuizProgress(quizProgress + 1);
                                                    setQuizScore(quizScore + 1);
                                                    if (quizProgress + 1 >= (quizzes.find(q => q.id === quizMode)?.questions || 1)) {
                                                        finishQuiz();
                                                    }
                                                }}
                                                style={{
                                                    flex: 1, padding: '8px', background: 'rgba(76,205,196,0.2)',
                                                    border: '1px solid rgba(76,205,196,0.4)', borderRadius: '8px',
                                                    color: '#4ECDC4', cursor: 'pointer', fontSize: '12px', fontWeight: '500'
                                                }}
                                            >
                                                ✓ Correct
                                            </button>
                                            <button
                                                onClick={() => {
                                                    setQuizProgress(quizProgress + 1);
                                                    if (quizProgress + 1 >= (quizzes.find(q => q.id === quizMode)?.questions || 1)) {
                                                        finishQuiz();
                                                    }
                                                }}
                                                style={{
                                                    flex: 1, padding: '8px', background: 'rgba(255,107,107,0.2)',
                                                    border: '1px solid rgba(255,107,107,0.4)', borderRadius: '8px',
                                                    color: '#FF6B6B', cursor: 'pointer', fontSize: '12px', fontWeight: '500'
                                                }}
                                            >
                                                ✗ Incorrect
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Exam Prep Tab */}
                        {activeTab === 'exam' && (
                            <div style={{ flex: 1, padding: '16px', display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                {exams.map(exam => (
                                    <div key={exam.id} style={{
                                        padding: '12px', background: 'rgba(100,200,255,0.08)',
                                        border: '1px solid rgba(100,200,255,0.2)', borderRadius: '8px'
                                    }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '8px' }}>
                                            <div style={{ flex: 1 }}>
                                                <div style={{ color: '#64C8FF', fontWeight: '500', fontSize: '13px' }}>{exam.subject}</div>
                                                <div style={{ color: '#FFD700', fontSize: '11px', marginTop: '2px' }}>
                                                    Exam Date: {new Date(exam.date).toLocaleDateString()}
                                                </div>
                                            </div>
                                            <div style={{ color: '#4ECDC4', fontSize: '13px', fontWeight: '500' }}>
                                                {exam.readiness}%
                                            </div>
                                        </div>
                                        <div style={{
                                            height: '4px', background: 'rgba(100,200,255,0.2)', borderRadius: '2px',
                                            marginBottom: '8px', overflow: 'hidden'
                                        }}>
                                            <div style={{
                                                height: '100%', background: '#4ECDC4', width: `${exam.readiness}%`
                                            }} />
                                        </div>
                                        <div style={{ fontSize: '11px', color: '#64C8FF80' }}>
                                            Topics: {exam.topics.join(', ')}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Tasks Tab */}
                        {activeTab === 'tasks' && (
                            <div style={{ padding: '16px', display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                <form onSubmit={addTask} style={{ display: 'flex', gap: '8px' }}>
                                    <input
                                        type="text"
                                        value={newTask}
                                        onChange={(e) => setNewTask(e.target.value)}
                                        placeholder="Add task..."
                                        style={{
                                            flex: 1, padding: '8px 12px', background: 'rgba(10,20,41,0.8)',
                                            border: '1px solid rgba(255,215,0,0.3)', borderRadius: '8px',
                                            color: '#FFD700', fontSize: '12px', fontFamily: 'inherit'
                                        }}
                                    />
                                    <button type="submit" style={{
                                        padding: '8px 12px', background: 'rgba(76,205,196,0.2)',
                                        border: '1px solid rgba(76,205,196,0.4)', borderRadius: '8px',
                                        color: '#4ECDC4', cursor: 'pointer'
                                    }}>
                                        +
                                    </button>
                                </form>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                    {tasks.map(task => (
                                        <div key={task.id} style={{
                                            padding: '10px 12px', background: 'rgba(100,200,255,0.08)',
                                            border: '1px solid rgba(100,200,255,0.2)', borderRadius: '8px',
                                            display: 'flex', alignItems: 'center', gap: '8px'
                                        }}>
                                            <input
                                                type="checkbox"
                                                checked={task.done}
                                                onChange={() => setTasks(tasks.map(t => t.id === task.id ? { ...t, done: !t.done } : t))}
                                                style={{ width: '16px', height: '16px', cursor: 'pointer' }}
                                            />
                                            <div style={{ flex: 1 }}>
                                                <div style={{ color: task.done ? '#64C8FF80' : '#64C8FF', fontSize: '12px', textDecoration: task.done ? 'line-through' : 'none' }}>
                                                    {task.text}
                                                </div>
                                                <div style={{ color: '#FFD700', fontSize: '10px', marginTop: '2px' }}>
                                                    {task.subject}
                                                </div>
                                            </div>
                                            <button
                                                onClick={() => setTasks(tasks.filter(t => t.id !== task.id))}
                                                style={{ background: 'transparent', border: 'none', color: '#FF6B6B', cursor: 'pointer' }}
                                            >
                                                ✕
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Timer Tab */}
                        {activeTab === 'timer' && (
                            <div style={{ flex: 1, padding: '32px 16px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '24px', justifyContent: 'center' }}>
                                <div style={{
                                    fontSize: '64px', fontWeight: '500', color: '#FFD700',
                                    fontFamily: 'monospace', letterSpacing: '4px'
                                }}>
                                    {formatTime(timerSeconds)}
                                </div>
                                <div style={{ display: 'flex', gap: '12px' }}>
                                    <button
                                        onClick={() => setIsTimerRunning(!isTimerRunning)}
                                        style={{
                                            padding: '10px 20px', background: 'rgba(255,215,0,0.2)',
                                            border: '1px solid rgba(255,215,0,0.4)', borderRadius: '8px',
                                            color: '#FFD700', cursor: 'pointer', fontWeight: '500', fontSize: '12px'
                                        }}
                                    >
                                        {isTimerRunning ? 'Pause' : 'Start'}
                                    </button>
                                    <button
                                        onClick={() => { setTimerSeconds(1500); setIsTimerRunning(false); }}
                                        style={{
                                            padding: '10px 20px', background: 'rgba(100,200,255,0.2)',
                                            border: '1px solid rgba(100,200,255,0.4)', borderRadius: '8px',
                                            color: '#64C8FF', cursor: 'pointer', fontWeight: '500', fontSize: '12px'
                                        }}
                                    >
                                        Reset
                                    </button>
                                </div>
                                <div style={{ color: '#64C8FF', fontSize: '12px', textAlign: 'center' }}>
                                    Pomodoro Timer: 25 minutes focused study
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<JarvisStudyAssistant />, document.getElementById('root'));
    </script>
</body>
</html>
